<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walmart Navbar Clone</title>
    <link rel="stylesheet" href="navigation.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>  

<header>
    <div class="top">
        <div class="left">
            <img src="assets/walmartlogo.jpeg" class="logo" >
            <div class="location-box">
                <i class="fa-solid fa-location-dot"></i>
                <div>
                    <span>Pickup or delivery?</span>                  
                </div>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search everything at Walmart online and in store">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="right">
            <div class="nav-item">
                <i class="fa-regular fa-heart"></i>
                <div> 
                    <span>Reorder</span>
                    <p>My Items</p>
                </div>
            </div>
            <div class="nav-item">
                <i class="fa-regular fa-user"></i>
                <div>
                    <span>Sign In</span>
                    <p>Account</p>
                </div>
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <p>$0.00</p>
            </div>
        </div>
    </div>
    <div class="bottom-navbar">
        <span>Departments <i class="fa-solid fa-chevron-down"></i></span>
        <span>Services <i class="fa-solid fa-chevron-down"></i></span>
        <span>Get it Fast</span>
        <span>Rollbacks & More</span>
        <span>Valentine's Day</span>
        <span>Virtual Care</span>
        <span>New Arrivals</span>
        <span>bettergoods</span>
        <span>Dinner Made Easy</span>
        <span>Walmart+</span>
        <span>More <i class="fa-solid fa-chevron-down"></i></span>
    </div>
    <div class="carousel">
      <br>
      <h4>Swings Strollers and More</h4>

    </div>
</header>

</body>
</html>
